name = "gem-enterprise-worker"
main = "src/index.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

# ── Bindings ──────────────────────────────────────────────────────────────────

[[d1_databases]]
binding = "DB"
database_name = "gem-enterprise-db"
database_id = "REPLACE_WITH_D1_DATABASE_ID"

[[r2_buckets]]
binding = "VAULT"
bucket_name = "gem-enterprise-vault"

[[kv_namespaces]]
binding = "CACHE"
id = "REPLACE_WITH_KV_NAMESPACE_ID"

# Uncomment to enable Queues (requires Queues beta access)
# [[queues.producers]]
# binding = "NOTIFICATION_QUEUE"
# queue = "gem-notifications"

# [[queues.consumers]]
# queue = "gem-notifications"
# max_batch_size = 10
# max_batch_timeout = 30

# ── Environment Variables (non-secret) ────────────────────────────────────────

[vars]
ENVIRONMENT = "production"
APP_NAME = "GEM Enterprise Worker"
APP_VERSION = "1.0.0"
FRONTEND_URL = "https://www.gemcybersecurityassist.com"
CORS_ORIGINS = "https://www.gemcybersecurityassist.com,https://gemcybersecurityassist.com"

# ── Secrets (set via `wrangler secret put`) ───────────────────────────────────
# JWT_SECRET
# CLOUDFLARE_API_TOKEN
# CLOUDFLARE_ACCOUNT_ID
# CLOUDFLARE_ZONE_ID

# ── Staging Environment ──────────────────────────────────────────────────────

[env.staging]
name = "gem-enterprise-worker-staging"

[env.staging.vars]
ENVIRONMENT = "staging"
FRONTEND_URL = "https://staging.gemcybersecurityassist.com"
CORS_ORIGINS = "https://staging.gemcybersecurityassist.com,http://localhost:3000"

# ── Development ───────────────────────────────────────────────────────────────

[env.dev]
name = "gem-enterprise-worker-dev"

[env.dev.vars]
ENVIRONMENT = "development"
FRONTEND_URL = "http://localhost:3000"
CORS_ORIGINS = "http://localhost:3000,http://localhost:8787"
