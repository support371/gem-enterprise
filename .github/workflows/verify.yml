name: Verify

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: verify-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Prisma, lint, types, tests, build
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      CI: "true"
      NODE_ENV: test
      JWT_SECRET: github-actions-verification-secret-min-32-characters
      POSTGRES_PRISMA_URL: postgresql://ci:ci@127.0.0.1:5432/gem_ci
      POSTGRES_URL_NON_POOLING: postgresql://ci:ci@127.0.0.1:5432/gem_ci
      DATABASE_URL: postgresql://ci:ci@127.0.0.1:5432/gem_ci
      SMTP_HOST: ""
      SMTP_PORT: "587"
      SMTP_USER: ""
      SMTP_PASS: ""
      CRON_SECRET: github-actions-verification-cron-secret
      AUDIT_ENABLED: "true"

    steps:
      - name: Checkout and verify
        shell: bash
        run: |
          set -euo pipefail

          git init .
          git remote add origin "https://github.com/${GITHUB_REPOSITORY}.git"
          git fetch --depth=1 origin "${GITHUB_SHA}"
          git checkout --detach FETCH_HEAD

          export NVM_DIR="${NVM_DIR:-$HOME/.nvm}"
          if [ -s "$NVM_DIR/nvm.sh" ]; then
            . "$NVM_DIR/nvm.sh"
            nvm install 24
            nvm use 24
          fi

          node --version
          corepack enable
          corepack prepare pnpm@10.28.0 --activate
          pnpm --version

          pnpm install --frozen-lockfile
          pnpm run db:generate
          pnpm run verify:preview
          pnpm exec next build
