name: Verify

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: verify-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Prisma, lint, types, tests, build
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      CI: "true"
      NODE_ENV: test
      JWT_SECRET: github-actions-verification-secret-min-32-characters
      POSTGRES_PRISMA_URL: postgresql://ci:ci@127.0.0.1:5432/gem_ci
      POSTGRES_URL_NON_POOLING: postgresql://ci:ci@127.0.0.1:5432/gem_ci
      DATABASE_URL: postgresql://ci:ci@127.0.0.1:5432/gem_ci
      SMTP_HOST: ""
      SMTP_PORT: "587"
      SMTP_USER: ""
      SMTP_PASS: ""
      CRON_SECRET: github-actions-verification-cron-secret
      AUDIT_ENABLED: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Promote and validate Prisma schema
        run: pnpm run db:generate

      - name: Verify claims, lint, types, and tests
        run: pnpm run verify:preview

      - name: Build optimized Next.js application
        run: pnpm exec next build
