name: Verify administrator access fix

on:
  pull_request:
    branches: [main]
    paths:
      - "src/app/admin-access/**"
      - "src/app/api/admin-access/**"
      - "src/lib/admin-access-token-validation.ts"
      - "src/__tests__/admin-access-*.test.ts"
      - "prisma/migrations/20260713014500_add_admin_access_token_validation/**"
      - ".github/workflows/verify-admin-access-fix.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      NODE_ENV: test
      JWT_SECRET: preview-verification-secret-min-32-characters
      POSTGRES_PRISMA_URL: postgresql://ci:ci@localhost:5432/gem_ci
      POSTGRES_URL_NON_POOLING: postgresql://ci:ci@localhost:5432/gem_ci
      SMTP_HOST: ""
      SMTP_PORT: "587"
      SMTP_USER: ""
      SMTP_PASS: ""
      CRON_SECRET: preview-verification-cron-secret
      AUDIT_ENABLED: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm run db:generate

      - name: Lint
        run: pnpm run lint

      - name: Typecheck
        run: pnpm run typecheck

      - name: Unit tests
        run: pnpm run test

      - name: Production build
        run: pnpm exec next build
