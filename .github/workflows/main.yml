name: Guardian Workflow

on:
  push:
    branches: [main, codex/fix-homepage-render-and-visibility-issues]
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: read

concurrency:
  group: guardian-${{ github.ref }}
  cancel-in-progress: true

jobs:
  guardian-check:
    name: Inspect, validate, and verify
    runs-on: ubuntu-latest

    env:
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
      VITE_SUPABASE_PROJECT_ID: ${{ secrets.VITE_SUPABASE_PROJECT_ID }}

    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Inspect repository contract
        run: |
          set -euo pipefail
          echo "Guardian inspection started"
          test -f package.json
          test -f .github/workflows/main.yml
          test -f .env.example
          grep -q "VITE_SUPABASE_URL" .env.example
          grep -q "VITE_SUPABASE_PUBLISHABLE_KEY" .env.example
          echo "Branch: ${GITHUB_REF_NAME}"
          git status --short

      - name: Verify Supabase environment contract
        run: |
          set -euo pipefail
          missing=0
          if [ -z "${VITE_SUPABASE_URL:-}" ]; then
            echo "Missing required secret: VITE_SUPABASE_URL"
            missing=1
          fi
          if [ -z "${VITE_SUPABASE_PUBLISHABLE_KEY:-}" ]; then
            echo "Missing required secret: VITE_SUPABASE_PUBLISHABLE_KEY"
            missing=1
          fi
          if [ "$missing" -ne 0 ]; then
            echo "Supabase env contract is incomplete. Configure these in GitHub Actions secrets and Vercel project env vars before release."
            exit 1
          fi
          echo "Supabase env contract present."

      - name: Install dependencies
        run: npm ci

      - name: Auto-fix deterministic maintenance only
        run: echo "No destructive auto-fixes enabled."

      - name: Commit and push changes if any fixes were made
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Automated fix by Guardian Workflow"
          branch: ${{ github.ref_name }}

      - name: Run lint when available
        run: |
          set -euo pipefail
          if npm run | grep -q " lint"; then npm run lint; else echo "No lint script"; fi

      - name: Run tests when available
        run: |
          set -euo pipefail
          if npm run | grep -q " test"; then npm test; else echo "No test script"; fi

      - name: Build application
        run: npm run build

      - name: Verify deployed root URL
        if: github.event_name != 'pull_request'
        run: |
          set -euo pipefail
          curl --fail --location --silent --show-error --max-time 30 https://gem-enterprise.vercel.app > /tmp/guardian-root.html
          grep -qi "GEM" /tmp/guardian-root.html

      - name: Log output
        run: echo "Guardian workflow completed."
