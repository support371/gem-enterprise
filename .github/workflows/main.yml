name: Guardian Workflow

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: guardian-${{ github.ref }}
  cancel-in-progress: true

jobs:
  guardian-check:
    name: Inspect, validate, and verify
    runs-on: ubuntu-latest

    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://guardian:guardian@localhost:5432/gem_guardian
      POSTGRES_PRISMA_URL: postgresql://guardian:guardian@localhost:5432/gem_guardian
      POSTGRES_URL_NON_POOLING: postgresql://guardian:guardian@localhost:5432/gem_guardian
      JWT_SECRET: guardian-ci-secret-min-32-characters-long
      NEXT_PUBLIC_APP_URL: https://gemcybersecurityassist.com
      NEXT_PUBLIC_SITE_URL: https://gemcybersecurityassist.com
      NEXT_PUBLIC_APP_NAME: GEM Enterprise
      NEXT_PUBLIC_AI_DISCLOSURE_TEXT: GEM Concierge is an AI assistant. Responses are for informational purposes only.
      ANTHROPIC_API_KEY: ""
      AUDIT_ENABLED: "true"
      SMTP_HOST: ""
      SMTP_PORT: "587"
      SMTP_USER: ""
      SMTP_PASS: ""
      CRON_SECRET: guardian-cron-secret

    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Inspect repository contract
        run: |
          set -euo pipefail
          echo "Guardian inspection started"
          test -f package.json
          test -f pnpm-lock.yaml
          test -f prisma/schema.prisma
          test -f next.config.ts
          test -f .github/workflows/main.yml
          grep -q '"build": "next build"' package.json
          echo "Tracked branch: ${GITHUB_REF_NAME}"
          git status --short

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm run db:generate

      - name: Run lint
        run: pnpm run lint

      - name: Run tests
        run: pnpm test

      - name: Build application
        run: pnpm run build

      - name: Log output
        run: echo "Guardian workflow completed."
