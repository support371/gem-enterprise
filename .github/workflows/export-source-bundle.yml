name: Export Source Bundle

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/export-source-bundle.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  export-source:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out exact commit
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Create source archive
        shell: bash
        run: |
          set -euo pipefail
          archive="gem-enterprise-source-${GITHUB_SHA}.tar.gz"
          tar \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='.next' \
            --exclude='.vercel' \
            --exclude='*.env.local' \
            --exclude='.env' \
            -czf "$archive" .
          echo "ARCHIVE_PATH=$archive" >> "$GITHUB_ENV"

      - name: Upload exact source bundle
        uses: actions/upload-artifact@v4
        with:
          name: gem-enterprise-source-${{ github.sha }}
          path: ${{ env.ARCHIVE_PATH }}
          if-no-files-found: error
          retention-days: 1
          compression-level: 0
